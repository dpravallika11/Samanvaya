{% extends 'base.html' %}
{% block content %}
<div class="relative min-h-screen flex items-center justify-center overflow-hidden bg-gradient-to-br from-slate-50 via-white to-indigo-50/30">
    <!-- Decorative background blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-indigo-200/40 mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute top-[20%] right-[-10%] w-[400px] h-[400px] rounded-full bg-teal-200/40 mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] rounded-full bg-purple-200/40 mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000"></div>

    <div class="z-10 container mx-auto px-6 py-12 flex flex-col items-center text-center">
        <!-- Hero Tag -->
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-50 border border-indigo-100/50 text-indigo-600 text-sm font-semibold tracking-wide mb-8 animate-fade-in-up">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
            </span>
            Next-Gen Data Engine
        </div>

        <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 via-indigo-900 to-slate-800 tracking-tight leading-tight mb-6 animate-fade-in-up animation-delay-150">
            Samanvãya
        </h1>
        
        <p class="text-lg md:text-2xl text-slate-600 font-medium max-w-3xl mb-12 animate-fade-in-up animation-delay-300 leading-relaxed">
            AI-powered dataset transformation and schema harmonization platform.
        </p>

        <!-- Illustration -->
        <div class="relative w-full max-w-lg mb-12 animate-fade-in-up animation-delay-450 group">
            <div class="absolute inset-0 bg-gradient-to-tr from-indigo-100 to-teal-100 rounded-[3rem] transform rotate-3 scale-105 group-hover:rotate-6 group-hover:scale-110 transition-transform duration-700 ease-out opacity-50"></div>
            <div class="relative bg-white/80 backdrop-blur-sm border border-white/50 shadow-2xl rounded-[2.5rem] p-8 mt-2 transform -rotate-1 group-hover:rotate-0 transition-transform duration-500 ease-out">
                <svg class="w-full h-auto text-indigo-500 drop-shadow-md group-hover:text-indigo-600 transition-colors duration-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                    <path d="M7 10l3 3 7-7"></path>
                </svg>
            </div>
        </div>

        <!-- CTA Button -->
        <a href="{{ url_for('login') }}" class="group relative inline-flex items-center justify-center px-10 py-4 text-lg font-bold text-white transition-all duration-300 ease-out bg-indigo-600 border border-transparent rounded-full overflow-hidden hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-600/30 shadow-xl shadow-indigo-600/20 hover:shadow-2xl hover:-translate-y-1 animate-fade-in-up animation-delay-600">
            <span class="absolute right-0 w-8 h-32 -mt-12 transition-all duration-1000 transform translate-x-12 bg-white opacity-10 rotate-12 group-hover:-translate-x-40 ease"></span>
            <span class="relative flex items-center gap-2">
                Get Started
                <svg class="w-5 h-5 transition-transform duration-300 ease-out group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </span>
        </a>
    </div>
</div>

<style>
@keyframes blob {
  0% { transform: translate(0px, 0px) scale(1); }
  33% { transform: translate(30px, -50px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.9); }
  100% { transform: translate(0px, 0px) scale(1); }
}
.animate-blob {
  animation: blob 7s infinite;
}
.animation-delay-2000 { animation-delay: 2s; }
.animation-delay-4000 { animation-delay: 4s; }
.animation-delay-150 { animation-delay: 150ms; }
.animation-delay-300 { animation-delay: 300ms; }
.animation-delay-450 { animation-delay: 450ms; }
.animation-delay-600 { animation-delay: 600ms; }
</style>
{% endblock %}
